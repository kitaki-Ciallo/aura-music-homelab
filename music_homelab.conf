server {
    listen 9921;
    server_name localhost;

    # 请修改为您实际上传 dist 文件夹的路径
    root /var/www/music_homelab;
    index index.html;

    # 开启 Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;

    # 主应用路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 如果您使用了 generate_metadata.sh 生成的歌单
    # 假设您的音乐文件存放在 /var/www/music_files
    # 并且 metadata.json 里的 fileUrl 是 /music/xxx.mp3
    location /CloudMusic/ {
        alias /var/www/CloudMusic/;
        autoindex off;
    }
}
