server {
    listen 9921 ssl;
    listen [::]:9921 ssl;
    server_name kitauji.top;

    ssl_certificate     /etc/nginx/ssl/kitauji.top.pem;
    ssl_certificate_key /etc/nginx/ssl/kitauji.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    error_page 497 https://$host:$server_port$request_uri;

    #请修改为您实际上传 dist 文件夹的路径
    root /var/www/music_homelab;
    index index.html;

    # 开启 Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;

    # 主应用路由 (SPA)
    location / {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /index.html;
    }

    # API 代理到 Node.js 后端 (默认 3002 端口)
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 音乐文件直接由 Nginx 服务 (性能更好)
    # 请修改为您真实存放音乐的绝对路径
    location /music/ {
        alias /path/to/your/music/; # 例如 /home/user/music/
        autoindex off;
        expires 7d;
        add_header Access-Control-Allow-Origin *;
    }

    # 静态资源缓存配置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
